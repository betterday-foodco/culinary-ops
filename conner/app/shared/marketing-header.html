<style>
.main-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:#4EA2FD;font-family:'SofiaProSoft',system-ui,sans-serif;}
.main-nav .nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0;}
.main-nav .nav-logo svg{height:34px;width:auto;display:block;}
.main-nav .nav-links{display:flex;align-items:center;gap:32px;list-style:none;margin:0;padding:0;}
.main-nav .nav-links a{text-decoration:none;color:#FAEBDA;font-family:'SofiaProSoft',sans-serif;font-size:14px;font-weight:700;transition:opacity .2s;}
.main-nav .nav-links a:hover{opacity:.72;}
.main-nav .nav-actions{display:flex;align-items:center;gap:18px;}
.main-nav .nav-signin{color:#FAEBDA;text-decoration:none;font-family:'SofiaProSoft',sans-serif;font-size:14px;font-weight:700;opacity:.85;transition:opacity .2s;}
.main-nav .nav-signin:hover{opacity:1;}
.main-nav .nav-cta-order{background:#FFC600;color:#003141;padding:10px 22px;border-radius:100px;font-family:'SofiaProSoft',sans-serif;font-weight:700;font-size:14px;text-decoration:none;transition:transform .15s,box-shadow .15s;}
.main-nav .nav-cta-order:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,49,65,.25);}
.main-nav .nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;width:40px;height:40px;flex-direction:column;justify-content:center;align-items:center;gap:5px;}
.main-nav .nav-hamburger span{display:block;width:22px;height:2.5px;background:#FAEBDA;border-radius:2px;transition:transform .25s,opacity .2s;}
body.nav-open .main-nav .nav-hamburger span:nth-child(1){transform:translateY(7.5px) rotate(45deg);}
body.nav-open .main-nav .nav-hamburger span:nth-child(2){opacity:0;}
body.nav-open .main-nav .nav-hamburger span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}
.nav-drawer{position:fixed;top:64px;left:0;right:0;background:#4EA2FD;padding:20px 28px 32px;display:none;flex-direction:column;z-index:99;box-shadow:0 12px 28px rgba(0,49,65,.25);font-family:'SofiaProSoft',system-ui,sans-serif;}
.nav-drawer a{color:#FAEBDA;text-decoration:none;font-family:'SofiaProSoft',sans-serif;font-size:17px;font-weight:700;padding:14px 0;border-bottom:1px solid rgba(250,235,218,.15);}
.nav-drawer .nav-cta-mobile{background:#FFC600;color:#003141;padding:16px 20px;border-radius:100px;text-align:center;font-size:15px;margin-top:16px;border:none;}
body.nav-open .nav-drawer{display:flex;}
@media(max-width:768px){
  .main-nav{padding:0 18px;height:60px;}
  .main-nav .nav-links,.main-nav .nav-signin{display:none;}
  .main-nav .nav-hamburger{display:flex;}
  .nav-drawer{top:60px;}
}
</style>
